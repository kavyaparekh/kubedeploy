---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubedeploy-api
  namespace: kubedeploy
  labels:
    app: kubedeploy-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubedeploy-api
  template:
    metadata:
      labels:
        app: kubedeploy-api
    spec:
      serviceAccountName: kubedeploy-sa
      containers:
        - name: api
          image: kubedeploy-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: KUBEDEPLOY_DEMO
              value: "false"       # set to "true" for demo mode without a registry
            - name: IMAGE_REGISTRY
              value: "localhost:5000"
            - name: K8S_NAMESPACE
              value: "kubedeploy"
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: kubedeploy-secrets
                  key: webhook-secret
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: kubedeploy-api-svc
  namespace: kubedeploy
spec:
  selector:
    app: kubedeploy-api
  type: NodePort
  ports:
    - port: 80
      targetPort: 8000
      nodePort: 30080
