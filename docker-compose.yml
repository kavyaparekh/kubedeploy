version: "3.9"

services:
  kubedeploy-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - KUBEDEPLOY_DEMO=true
      - IMAGE_REGISTRY=localhost:5000
      - K8S_NAMESPACE=kubedeploy
    volumes:
      - .:/app
      # Mount kubeconfig for real cluster mode
      # - ~/.kube:/root/.kube:ro
    restart: unless-stopped

  # Local Docker registry (used in real cluster mode)
  registry:
    image: registry:2
    ports:
      - "5000:5000"
    volumes:
      - registry-data:/var/lib/registry

volumes:
  registry-data:
